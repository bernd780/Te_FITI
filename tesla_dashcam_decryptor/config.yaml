name: Te_FITI
version: "0.4.27"
slug: te_fiti
description: >-
  Multi-camera Tesla dashcam viewer for Home Assistant with telemetry HUD,
  GPS map and event metadata. Optionally decrypts encrypted clips (firmware
  2026.20+) with a one-time Tesla login — keys are stored locally, everything
  runs offline after that.
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:car-cctv
panel_title: Te_FITI
# CIFS mount requires SYS_ADMIN; default AppArmor blocks mount syscall.
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
apparmor: false
options:
  smb_host: "192.168.1.100"
  smb_share: "Tesla_Video"
  enc_subpath: "TeslaCam/EncryptedClips"
  dec_subpath: "decrypted"
  clips_subpath: "TeslaCam"
  smb_username: ""
  smb_password: ""
  smb_domain: ""
  smb_version: "3.0"
  interval_seconds: 300
  auto_decrypt: true
  enable_direct_api: true
  key_after_decrypt: hidden
  delete_originals: false
schema:
  smb_host: str
  smb_share: str
  enc_subpath: str
  dec_subpath: str
  clips_subpath: str
  smb_username: str?
  smb_password: password?
  smb_domain: str?
  smb_version: list(3.1.1|3.0|2.1|1.0)?
  interval_seconds: int(0,)
  auto_decrypt: bool
  enable_direct_api: bool
  key_after_decrypt: list(hidden|embed)
  delete_originals: bool
